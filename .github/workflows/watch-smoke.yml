name: Watch smoke

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke
        working-directory: chatiq-watch
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          WATCH_SMOKE_API_KEY: ${{ secrets.WATCH_SMOKE_API_KEY }}
          BOT_SLUG: watch-canary
        run: node scripts/run-smoke.mjs
